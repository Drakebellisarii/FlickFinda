<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlickFinda</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --gold: #E5B94E;
            --dark-gold: #b47a22;
            --red: #8B1E3F;
            --dark-red: #5a142a;
            --blue: #1a2632;
            --light-blue: rgb(59, 99, 138);
            --text: #E8E9F3;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #0d0d0d;
            font-family: 'Courier Prime', monospace;
        }

        /* Full-screen backdrop */
        #auth-screen {
            min-height: 100vh;
            background: rgba(0,0,0,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        /* Card */
        .auth-card {
            background: var(--blue);
            width: 100%;
            max-width: 420px;
            border: 4px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            animation: popIn 0.4s cubic-bezier(0.17, 0.67, 0.21, 1.4);
        }

        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        /* Header */
        .card-header {
            background: var(--red);
            text-align: center;
            padding: 1.25rem 1rem;
        }

        .card-header h2 {
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.75rem, 4vw, 1.15rem);
            margin: 0 0 0.75rem 0;
            text-shadow: 2px 2px 0 var(--dark-red);
            line-height: 1.5;
        }

        .bulbs {
            width: 100%;
            height: 8px;
            background-image: radial-gradient(circle, var(--gold) 30%, var(--dark-gold) 70%);
            background-size: 18px 18px;
            animation: bulbsFlash 2.5s infinite alternate;
        }

        @keyframes bulbsFlash {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Body */
        .card-body {
            padding: 1.75rem 1.5rem;
        }

        .card-subtitle {
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.5rem, 2.5vw, 0.7rem);
            text-align: center;
            margin: 0 0 1.5rem 0;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* Form fields */
        .field {
            margin-bottom: 1.25rem;
        }

        .field label {
            display: block;
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.5rem, 2.5vw, 0.65rem);
            margin-bottom: 0.5rem;
        }

        .field input[type="text"],
        .field input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0,0,0,0.35);
            border: 2px solid var(--dark-gold);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Courier Prime', monospace;
            font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .field input[type="text"]:focus,
        .field input[type="password"]:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(229,185,78,0.35);
        }

        .show-pw {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .show-pw label {
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.45rem, 2vw, 0.58rem);
            margin: 0;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .remember-row label {
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.45rem, 2vw, 0.6rem);
        }

        /* Password strength */
        .strength-bar-wrap {
            height: 4px;
            background: #444;
            border-radius: 2px;
            overflow: hidden;
            margin: 0.5rem 0 0.3rem;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0;
            background: #ff4136;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-label {
            font-size: 0.65rem;
            color: var(--text);
            opacity: 0.8;
        }

        /* Error */
        .form-error {
            color: #ff4136;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.45rem, 2vw, 0.6rem);
            min-height: 1.2em;
            margin-bottom: 1rem;
            text-align: center;
            line-height: 1.5;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--red);
            border: 2px solid var(--dark-gold);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.55rem, 2.5vw, 0.75rem);
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--dark-gold);
            transition: all 0.25s;
            -webkit-appearance: none;
        }

        .btn-primary:hover, .btn-primary:active {
            background: var(--gold);
            color: var(--dark-red);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--dark-gold);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-link {
            background: transparent;
            border: none;
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.5rem, 2vw, 0.65rem);
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            padding: 0.4rem;
            transition: color 0.2s;
            line-height: 1.6;
        }

        .btn-link:hover { color: var(--text); }

        .switch-row {
            text-align: center;
            margin-top: 0.75rem;
        }

        /* Guest section */
        .guest-section {
            margin-top: 1.25rem;
            border-top: 1px dashed var(--dark-gold);
            padding-top: 1.25rem;
            text-align: center;
        }

        .btn-guest {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold);
            border-radius: 4px;
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.45rem, 2vw, 0.62rem);
            padding: 0.55rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-appearance: none;
        }

        .btn-guest:hover { background: rgba(229,185,78,0.1); }

        .guest-note {
            color: var(--text);
            font-size: 0.65rem;
            opacity: 0.65;
            margin: 0.5rem 0 0;
        }

        /* Toast */
        #auth-toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--blue);
            color: var(--gold);
            padding: 0.85rem 1.5rem;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65rem;
            z-index: 9999;
            opacity: 0;
            transition: transform 0.35s, opacity 0.35s;
            white-space: nowrap;
        }

        #auth-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Ticket tear divider */
        .ticket-tear {
            height: 10px;
            background-image:
                linear-gradient(90deg, transparent 0%, transparent 50%, var(--gold) 50%, var(--gold) 100%),
                linear-gradient(90deg, var(--gold) 0%, var(--gold) 50%, transparent 50%, transparent 100%);
            background-size: 14px 10px, 14px 10px;
            background-position: 0 0, 7px 0;
        }
    </style>
</head>
<body>

<div id="auth-screen">

    <!-- LOGIN CARD -->
    <div id="login-container" class="auth-card">
        <div class="card-header">
            <h2>Welcome to FlickFinda</h2>
            <div class="bulbs"></div>
        </div>
        <div class="ticket-tear"></div>
        <div class="card-body">
            <p class="card-subtitle">Sign in to access your movie collection</p>

            <form id="login-form" autocomplete="on">
                <div class="field">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" autocomplete="username">
                </div>

                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password">
                    <div class="show-pw">
                        <input type="checkbox" id="show-password">
                        <label for="show-password">Show password</label>
                    </div>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>

                <div id="login-error" class="form-error"></div>

                <button type="submit" class="btn-primary">Take Your Seat</button>

                <div class="switch-row">
                    <button type="button" id="switch-to-register" class="btn-link">New Here? Sign Up</button>
                </div>
            </form>

            <div class="guest-section">
                <button id="continue-as-guest" class="btn-guest">Continue as Guest</button>
                <p class="guest-note">Some features will be limited</p>
            </div>
        </div>
    </div>

    <!-- REGISTER CARD -->
    <div id="register-container" class="auth-card" style="display:none;">
        <div class="card-header">
            <h2>Join FlickFinda</h2>
            <div class="bulbs"></div>
        </div>
        <div class="ticket-tear"></div>
        <div class="card-body">
            <p class="card-subtitle">Create your account to track your movies</p>

            <form id="register-form" autocomplete="on">
                <div class="field">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" autocomplete="username">
                </div>

                <div class="field">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" autocomplete="new-password">
                    <div class="strength-bar-wrap">
                        <div id="strength-fill" class="strength-bar-fill"></div>
                    </div>
                    <span id="strength-text" class="strength-label">Password strength</span>
                </div>

                <div class="field">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" name="confirm" autocomplete="new-password">
                </div>

                <div id="register-error" class="form-error"></div>

                <button type="submit" class="btn-primary">Join FlickFinda</button>

                <div class="switch-row">
                    <button type="button" id="back-to-login" class="btn-link">Back to Login</button>
                </div>
            </form>
        </div>
    </div>

</div>

<div id="auth-toast"></div>

<script>
(function () {
    const loginContainer    = document.getElementById('login-container');
    const registerContainer = document.getElementById('register-container');

    // Switch forms
    document.getElementById('switch-to-register').addEventListener('click', function () {
        loginContainer.style.display    = 'none';
        registerContainer.style.display = 'block';
    });

    document.getElementById('back-to-login').addEventListener('click', function () {
        registerContainer.style.display = 'none';
        loginContainer.style.display    = 'block';
    });

    // Show/hide password
    document.getElementById('show-password').addEventListener('change', function () {
        document.getElementById('login-password').type = this.checked ? 'text' : 'password';
    });

    // Password strength
    document.getElementById('register-password').addEventListener('input', function () {
        const pw = this.value;
        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');
        let score = 0;
        if (pw.length >= 8)           score++;
        if (/[A-Z]/.test(pw))         score++;
        if (/[a-z]/.test(pw))         score++;
        if (/[0-9]/.test(pw))         score++;
        if (/[^A-Za-z0-9]/.test(pw))  score++;

        if (!pw) {
            fill.style.width = '0'; fill.style.backgroundColor = '#ff4136';
            text.textContent = 'Password strength';
        } else if (score <= 2) {
            fill.style.width = '33%'; fill.style.backgroundColor = '#ff4136';
            text.textContent = 'Weak password';
        } else if (score <= 4) {
            fill.style.width = '66%'; fill.style.backgroundColor = '#ffb700';
            text.textContent = 'Medium password';
        } else {
            fill.style.width = '100%'; fill.style.backgroundColor = '#2ecc40';
            text.textContent = 'Strong password';
        }
    });

    // Toast helper
    function showToast(msg) {
        const t = document.getElementById('auth-toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function () { t.classList.remove('show'); }, 3000);
    }

    // Guest login
    document.getElementById('continue-as-guest').addEventListener('click', function () {
        fetch('/api/auth/guest', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(function (d) { if (d.success) window.location.href = '/'; })
            .catch(function () { window.location.href = '/'; });
    });

    // Login submission
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const username   = document.getElementById('login-username').value.trim();
        const password   = document.getElementById('login-password').value;
        const rememberMe = document.getElementById('remember-me').checked;
        const errorEl    = document.getElementById('login-error');
        const btn        = this.querySelector('button[type="submit"]');

        if (!username || !password) { errorEl.textContent = 'Please fill in all fields'; return; }

        const orig = btn.textContent;
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        errorEl.textContent = '';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username: username, password: password, remember_me: rememberMe })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.success) {
                showToast('Login successful! Redirecting...');
                window.location.href = '/';
            } else {
                errorEl.textContent = data.message || 'Login failed';
                btn.textContent = orig;
                btn.disabled = false;
            }
        })
        .catch(function () {
            errorEl.textContent = 'Network error. Please try again.';
            btn.textContent = orig;
            btn.disabled = false;
        });
    });

    // Register submission
    document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const username  = document.getElementById('register-username').value.trim();
        const password  = document.getElementById('register-password').value;
        const confirm   = document.getElementById('register-confirm').value;
        const errorEl   = document.getElementById('register-error');
        const btn       = this.querySelector('button[type="submit"]');

        if (!username || !password || !confirm) { errorEl.textContent = 'Please fill in all fields'; return; }
        if (password !== confirm) { errorEl.textContent = 'Passwords do not match'; return; }
        if (password.length < 6)  { errorEl.textContent = 'Password must be at least 6 characters'; return; }

        const orig = btn.textContent;
        btn.textContent = 'Creating account...';
        btn.disabled = true;
        errorEl.textContent = '';

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username: username, password: password })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.success) {
                showToast('Registration successful! Redirecting...');
                window.location.href = '/';
            } else {
                errorEl.textContent = data.message || 'Registration failed';
                btn.textContent = orig;
                btn.disabled = false;
            }
        })
        .catch(function () {
            errorEl.textContent = 'Network error. Please try again.';
            btn.textContent = orig;
            btn.disabled = false;
        });
    });
}());
</script>

</body>
</html>
